<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diff Review</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #181825;
      --surface2: #11111b;
      --border: #313244;
      --text: #cdd6f4;
      --text-dim: #6c7086;
      --text-bright: #f5f5f5;
      --accent: #89b4fa;
      --accent2: #a6e3a1;
      --red: #f38ba8;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --orange: #fab387;
      --comment-bg: #313244;
      --hover: #45475a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    button:focus-visible,
    .file-item:focus-visible,
    .tree-item:focus-visible,
    .line-num:focus-visible {
      outline: 2px solid #1f6feb;
      outline-offset: 1px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 4px;
    }

    .sidebar-header .project-name {
      font-size: 12px;
      color: var(--text-dim);
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12.5px;
      gap: 6px;
      color: var(--text-dim);
      user-select: none;
    }

    .tree-item:hover { background: var(--hover); color: var(--text); }
    .tree-item .twisty { width: 10px; text-align: center; }

    .file-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      gap: 8px;
      transition: background 0.15s;
    }

    .file-item:hover { background: var(--hover); }
    .file-item.active { background: var(--border); }

    .file-item .icon {
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .file-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .stats {
      font-size: 11px;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      flex-shrink: 0;
      display: flex;
      gap: 6px;
    }

    .stat-add { color: var(--green); }
    .stat-del { color: var(--red); }

    .file-item .comment-badge {
      width: 18px;
      height: 18px;
      background: var(--accent);
      color: var(--surface);
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .btn-export {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: var(--surface);
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-export:hover { opacity: 0.85; }
    .btn-export:disabled { opacity: 0.4; cursor: default; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .toolbar .file-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-bright);
    }

    .toolbar .hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    .view-toggle {
      margin-left: auto;
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface2);
    }

    .view-toggle button {
      min-height: 30px;
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
    }

    .view-toggle button.active {
      background: var(--border);
      color: var(--text);
    }

    .toolbar .btn-file-comment {
      min-height: 30px;
      padding: 6px 12px;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .toolbar .btn-file-comment:hover { background: var(--hover); }

    .diff-container {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    .diff-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.6;
    }

    .diff-table th {
      position: sticky;
      top: 0;
      background: var(--surface);
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      text-align: left;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      z-index: 10;
      user-select: none;
    }

    .diff-line {
      border-bottom: 1px solid rgba(49, 50, 68, 0.35);
    }

    .diff-line:hover { background: rgba(105, 122, 151, 0.14); }
    .diff-line.insert { background: rgba(46, 160, 67, 0.16); }
    .diff-line.insert:hover { background: rgba(46, 160, 67, 0.24); }
    .diff-line.delete { background: rgba(248, 81, 73, 0.16); }
    .diff-line.delete:hover { background: rgba(248, 81, 73, 0.24); }
    .diff-line.selecting { outline: 1px solid var(--accent); background: rgba(137, 180, 250, 0.2) !important; }

    .diff-line td {
      padding: 0 12px;
      vertical-align: top;
      white-space: pre;
    }

    .diff-line .line-num {
      width: 50px;
      min-width: 50px;
      text-align: right;
      color: var(--text-dim);
      user-select: none;
      padding-right: 10px;
      cursor: pointer;
      position: relative;
      overflow: visible;
    }

    .diff-line .line-num:hover { color: var(--accent); }

    .line-num .line-add-comment {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 13px;
      line-height: 16px;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .diff-line:hover .line-num .line-add-comment,
    .line-num .line-add-comment:focus-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .line-num .line-add-comment:hover {
      background: var(--accent);
      color: var(--surface);
      border-color: var(--accent);
    }

    /* Gutter comment indicator */
    .diff-line.has-comment .line-num::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .diff-line .line-content {
      width: 100%;
      min-width: 280px;
    }

    .diff-line .line-content-old,
    .diff-line .line-content-new {
      width: 50%;
      min-width: 280px;
    }

    body.mode-split .line-content-old,
    body.mode-split .line-content-new {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    body.mode-split .line-content-unified,
    body.mode-split .th-unified {
      display: none;
    }

    body.mode-unified .line-content-old,
    body.mode-unified .line-content-new,
    body.mode-unified .th-old-content,
    body.mode-unified .th-new-content {
      display: none;
    }

    .diff-line .prefix {
      display: inline-block;
      width: 16px;
      user-select: none;
      color: var(--text-dim);
    }

    .diff-line.insert .prefix { color: var(--green); }
    .diff-line.delete .prefix { color: var(--red); }

    .hunk-header {
      background: rgba(111, 66, 193, 0.15);
      color: #c9d1d9;
      font-size: 12px;
      user-select: none;
    }

    .hunk-header td { padding: 6px 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    /* Inline comment thread row */
    .comment-thread td,
    .inline-form td {
      padding: 0;
      background: var(--bg);
    }

    .inline-comment,
    .inline-comment-form {
      display: flex;
      padding: 12px 16px 14px 34px;
      gap: 10px;
    }

    .comment-connector,
    .form-connector {
      width: 18px;
      min-width: 18px;
      border-left: 2px solid #57606a;
      margin-left: 16px;
      border-bottom-left-radius: 8px;
      opacity: 0.8;
    }

    .thread-wrap,
    .form-wrap {
      flex: 1;
      max-width: 860px;
    }

    .comment-card,
    .form-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .comment-card + .comment-card {
      margin-top: 10px;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #8b949e;
    }

    .comment-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #238636;
      color: #f0f6fc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .comment-author {
      color: #c9d1d9;
      font-weight: 600;
    }

    .comment-location {
      margin-left: auto;
      font-size: 11px;
      color: #8b949e;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 1px 8px;
    }

    .comment-code {
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      font-size: 11px;
      background: #161b22;
      color: #c9d1d9;
      margin: 10px 12px 0;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      max-height: 170px;
      overflow-y: auto;
    }

    .comment-text {
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #c9d1d9;
    }

    .comment-actions {
      padding: 0 12px 10px;
      display: flex;
      justify-content: flex-end;
    }

    .comment-actions button {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      font-size: 11px;
      border-radius: 6px;
      padding: 3px 8px;
    }

    .comment-actions button:hover { color: #f85149; border-color: #f85149; }

    .form-card .selection-info {
      font-size: 11px;
      color: #8b949e;
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .form-card textarea {
      width: calc(100% - 24px);
      margin: 12px;
      min-height: 78px;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      resize: vertical;
      outline: none;
    }

    .form-card textarea:focus { border-color: #1f6feb; }

    .form-card .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin: 0 12px 12px;
    }

    .btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary { background: #238636; color: #f0f6fc; border-color: #2ea043; }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .btn-secondary { background: #21262d; color: #c9d1d9; }
    .btn-secondary:hover { background: #30363d; }

    .review-bar {
      border-top: 1px solid var(--border);
      background: #0d1117;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      bottom: 0;
      z-index: 25;
    }

    .review-summary {
      font-size: 12px;
      color: #8b949e;
    }

    .review-summary strong { color: #c9d1d9; }

    .review-actions {
      display: flex;
      gap: 8px;
    }

    @media (max-width: 980px) {
      .sidebar {
        width: 230px;
        min-width: 230px;
      }

      .toolbar {
        flex-wrap: wrap;
        row-gap: 8px;
      }

      .view-toggle {
        margin-left: 0;
      }

      .toolbar .hint {
        width: 100%;
        order: 10;
      }
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 640px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 { font-size: 15px; font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .modal-body pre {
      background: var(--surface2);
      padding: 16px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 12px;
    }

    .empty-state svg { width: 48px; height: 48px; opacity: 0.4; }
    .empty-state p { font-size: 13px; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: var(--surface);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
    }

    .toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--hover); }
  </style>
</head>
<body class="mode-split">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Diff Review</h1>
        <div class="project-name" id="projectName"></div>
      </div>
      <div class="file-list" id="fileList"></div>
      <div class="sidebar-footer">
        <button class="btn-export" id="btnExport" disabled>
          Export Review (<span id="commentCount">0</span>)
        </button>
      </div>
    </div>

    <div class="main">
      <div class="toolbar">
        <span class="file-name" id="currentFile">Select a file</span>
        <div class="view-toggle" id="viewToggle">
          <button id="btnSplitView" class="active" type="button">Side-by-side</button>
          <button id="btnUnifiedView" type="button">Unified</button>
        </div>
        <span class="hint" id="hint">Hover line numbers and click + to comment</span>
        <button class="btn-file-comment" id="btnFileComment" style="display:none">File comment</button>
      </div>
      <div class="diff-container" id="diffContainer">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <p>Select a file from the sidebar to review</p>
        </div>
        <table class="diff-table" id="diffTable" style="display:none">
          <thead>
            <tr>
              <th class="line-num" style="width:50px">Old</th>
              <th class="th-old-content">Old code</th>
              <th class="line-num" style="width:50px">New</th>
              <th class="th-new-content">New code</th>
              <th class="th-unified">Diff</th>
            </tr>
          </thead>
          <tbody id="diffBody"></tbody>
        </table>
      </div>
      <div class="review-bar" id="reviewBar">
        <span class="review-summary"><strong id="pendingCount">0</strong> <span id="pendingLabel">pending comments</span></span>
        <div class="review-actions">
          <button class="btn btn-secondary" id="btnReviewCancel">Dismiss draft</button>
          <button class="btn btn-primary" id="btnSubmitReview" disabled>Submit review</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Review Export</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <pre id="exportContent"></pre>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnCopyExport">Copy to Clipboard</button>
        <button class="btn btn-primary" id="btnCloseModal">Done</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
    "use strict";

    let files = [];
    let comments = [];
    let currentFileIndex = -1;
    let selection = null;
    let lastClickedIdx = null;
    let viewMode = "split";

    // Track line index -> (side, lineNum) mapping for comment placement
    let lineMap = [];

    async function init() {
      try {
        const res = await fetch("/api/files");
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await safeJson(res);
        files = data.files;
        document.getElementById("projectName").textContent = data.projectName;
        setViewMode("split", false);
        renderFileList();
        await loadComments();
      } catch (e) {
        console.error("Failed to load files:", e);
        showToast("Failed to load files: " + e.message);
      }
    }

    function setViewMode(mode, rerender = true) {
      viewMode = mode === "unified" ? "unified" : "split";
      document.body.classList.toggle("mode-split", viewMode === "split");
      document.body.classList.toggle("mode-unified", viewMode === "unified");
      document.getElementById("btnSplitView").classList.toggle("active", viewMode === "split");
      document.getElementById("btnUnifiedView").classList.toggle("active", viewMode === "unified");
      if (rerender && currentFileIndex >= 0) {
        renderDiff();
      }
    }

    const expandedDirs = new Set([""]);

    function renderFileList() {
      const list = document.getElementById("fileList");
      list.innerHTML = "";

      const tree = buildFileTree();
      renderTreeLevel(list, tree, "", 0);
    }

    function buildFileTree() {
      const root = { dirs: new Map(), files: [] };

      files.forEach((file, index) => {
        const name = file.newName !== "/dev/null" ? file.newName : file.oldName;
        const parts = name.split("/");
        let node = root;

        for (let i = 0; i < parts.length - 1; i++) {
          const part = parts[i];
          if (!node.dirs.has(part)) {
            node.dirs.set(part, { dirs: new Map(), files: [] });
          }
          node = node.dirs.get(part);
        }

        node.files.push({ index, file, name, base: parts[parts.length - 1] });
      });

      return root;
    }

    function renderTreeLevel(parentEl, node, basePath, depth) {
      const dirs = Array.from(node.dirs.keys()).sort((a, b) => a.localeCompare(b));
      const filesHere = node.files.sort((a, b) => a.base.localeCompare(b.base));

      for (const dir of dirs) {
        const path = basePath ? `${basePath}/${dir}` : dir;
        const isExpanded = expandedDirs.has(path);
        const row = document.createElement("div");
        row.className = "tree-item dir-item";
        row.style.paddingLeft = `${10 + depth * 14}px`;
        row.tabIndex = 0;
        row.innerHTML = `<span class="twisty">${isExpanded ? "▾" : "▸"}</span><span class="name">${escapeHtml(dir)}</span>`;
        const toggleDir = () => {
          if (isExpanded) expandedDirs.delete(path);
          else expandedDirs.add(path);
          renderFileList();
        };
        row.addEventListener("click", toggleDir);
        row.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleDir();
          }
        });
        parentEl.appendChild(row);

        if (isExpanded) {
          renderTreeLevel(parentEl, node.dirs.get(dir), path, depth + 1);
        }
      }

      for (const entry of filesHere) {
        const { index, file, name, base } = entry;
        const div = document.createElement("div");
        div.className = "file-item" + (index === currentFileIndex ? " active" : "");
        div.style.paddingLeft = `${20 + depth * 14}px`;
        div.tabIndex = 0;
        const icon = file.deleted ? "\u2716" : file.added ? "\u271A" : "\u270E";
        const commentCount = comments.filter(c => c.file === name).length;
        div.innerHTML = `
          <span class="icon">${icon}</span>
          <span class="name" title="${escapeHtml(name)}">${escapeHtml(base)}</span>
          <span class="stats">
            <span class="stat-add">+${file.stats.additions}</span>
            <span class="stat-del">-${file.stats.deletions}</span>
          </span>
          ${commentCount ? `<span class="comment-badge">${commentCount}</span>` : ""}
        `;
        div.addEventListener("click", () => selectFile(index));
        div.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            selectFile(index);
          }
        });
        parentEl.appendChild(div);
      }
    }

    function selectFile(index) {
      currentFileIndex = index;
      clearSelection();
      lastClickedIdx = null;
      renderFileList();
      renderDiff();
      const name = files[index].newName !== "/dev/null" ? files[index].newName : files[index].oldName;
      document.getElementById("currentFile").textContent = name;
      document.getElementById("hint").textContent = "Hover line numbers and click +, or drag to select a range";
      document.getElementById("btnFileComment").style.display = "";
    }

    function getCommentsForFile(fileName) {
      return comments.filter(c => c.file === fileName);
    }

    // Build a map of line indices that have comments, keyed by comment range key
    function buildCommentIndex(fileComments) {
      // Map from "side:startLine" or "side:startLine-endLine" -> [comments]
      const idx = new Map();
      for (const c of fileComments) {
        if (c.type === "file") continue;
        let key;
        if (c.type === "range") {
          key = `${c.side}:${c.startLine}-${c.endLine}`;
        } else {
          key = `${c.side}:${c.line}`;
        }
        if (!idx.has(key)) idx.set(key, []);
        idx.get(key).push(c);
      }
      return idx;
    }

    // Find the last line index in the diff table that matches a comment's target
    function findLineIdxForComment(comment) {
      for (let i = lineMap.length - 1; i >= 0; i--) {
        const entry = lineMap[i];
        if (comment.side === "old" && entry.oldNum != null && entry.oldNum !== "") {
          if (comment.type === "line" && parseInt(entry.oldNum) === comment.line) return i;
          if (comment.type === "range" && parseInt(entry.oldNum) >= comment.startLine && parseInt(entry.oldNum) <= comment.endLine) {
            // Return the last matching line
            return i;
          }
        }
        if (comment.side === "new" && entry.newNum != null && entry.newNum !== "") {
          if (comment.type === "line" && parseInt(entry.newNum) === comment.line) return i;
          if (comment.type === "range" && parseInt(entry.newNum) >= comment.startLine && parseInt(entry.newNum) <= comment.endLine) {
            return i;
          }
        }
      }
      return -1;
    }

    // Get the last line index for a range comment (the line after which to insert)
    function findLastLineIdxForRange(side, startLine, endLine) {
      let lastIdx = -1;
      for (let i = 0; i < lineMap.length; i++) {
        const entry = lineMap[i];
        const numField = side === "old" ? "oldNum" : "newNum";
        const num = entry[numField];
        if (num != null && num !== "") {
          const n = parseInt(num);
          if (n >= startLine && n <= endLine) {
            lastIdx = i;
          }
        }
      }
      return lastIdx;
    }

    function renderDiff() {
      const file = files[currentFileIndex];
      const tbody = document.getElementById("diffBody");
      const table = document.getElementById("diffTable");
      const empty = document.getElementById("emptyState");

      if (!file) {
        table.style.display = "none";
        empty.style.display = "flex";
        return;
      }

      table.style.display = "table";
      empty.style.display = "none";
      tbody.innerHTML = "";

      const fileName = file.newName !== "/dev/null" ? file.newName : file.oldName;
      const fileComments = getCommentsForFile(fileName);
      const commentIndex = buildCommentIndex(fileComments);
      const fileLevelComments = fileComments.filter(c => c.type === "file");
      const lineComments = fileComments.filter(c => c.type !== "file");

      lineMap = [];

      // Insert file-level comments at the top
      if (fileLevelComments.length > 0) {
        tbody.appendChild(createInlineCommentThread(fileLevelComments, fileName));
      }

      // Group line comments by their insertion point (the last line index they target)
      const insertionPoints = new Map(); // lineIdx -> [comments]
      for (const c of lineComments) {
        const lineIdx = findLastLineIdxForRange(c.side, c.startLine ?? c.line, c.endLine ?? c.line);
        if (lineIdx >= 0) {
          if (!insertionPoints.has(lineIdx)) insertionPoints.set(lineIdx, []);
          insertionPoints.get(lineIdx).push(c);
        }
      }

      // Track which line indices have comments for gutter indicators
      const commentedLineIdxs = new Set();
      for (const [li, cls] of insertionPoints) {
        // Mark all lines in the range
        const firstComment = cls[0];
        const startLine = firstComment.startLine ?? firstComment.line;
        const endLine = firstComment.endLine ?? firstComment.line;
        const side = firstComment.side;
        for (let i = 0; i < lineMap.length; i++) {
          const entry = lineMap[i];
          const numField = side === "old" ? "oldNum" : "newNum";
          const num = entry[numField];
          if (num != null && num !== "") {
            const n = parseInt(num);
            if (n >= startLine && n <= endLine) {
              commentedLineIdxs.add(i);
            }
          }
        }
      }

      // Rebuild lineMap and render diff lines with inline comments interleaved
      lineMap = [];
      let idx = 0;

      for (const hunk of file.hunks) {
        const hunkRow = document.createElement("tr");
        hunkRow.className = "hunk-header";
        hunkRow.innerHTML = `<td colspan="5">${escapeHtml(hunk.header)}</td>`;
        tbody.appendChild(hunkRow);

        for (const line of hunk.lines) {
          const lineIdx = idx;
          const tr = document.createElement("tr");
          tr.className = "diff-line " + (line.type === "insert" ? "insert" : line.type === "delete" ? "delete" : "");
          tr.dataset.idx = lineIdx;
          tr.dataset.type = line.type;
          tr.dataset.oldNum = line.oldNumber ?? "";
          tr.dataset.newNum = line.newNumber ?? "";
          tr.dataset.content = line.content ?? "";

          // Check if this line index has comments (for gutter indicator)
          // We'll add this class after building the full lineMap

          const prefix = line.type === "insert" ? "+" : line.type === "delete" ? "-" : " ";

          const oldContent = line.type === "insert" ? "" : escapeHtml(line.content);
          const newContent = line.type === "delete" ? "" : escapeHtml(line.content);

          const oldNum = line.oldNumber ?? "";
          const newNum = line.newNumber ?? "";
          const oldBtn = oldNum !== "" ? `<button class="line-add-comment" data-side="old" aria-label="Add comment on left line ${oldNum}" title="Add comment">+</button>` : "";
          const newBtn = newNum !== "" ? `<button class="line-add-comment" data-side="new" aria-label="Add comment on right line ${newNum}" title="Add comment">+</button>` : "";

          const oldAttrs = oldNum !== "" ? `tabindex="0" role="button" aria-label="Select left line ${oldNum}"` : "";
          const newAttrs = newNum !== "" ? `tabindex="0" role="button" aria-label="Select right line ${newNum}"` : "";

          tr.innerHTML = `
            <td class="line-num" data-side="old" ${oldAttrs}>${oldNum}${oldBtn}</td>
            <td class="line-content line-content-old">${oldContent}</td>
            <td class="line-num" data-side="new" ${newAttrs}>${newNum}${newBtn}</td>
            <td class="line-content line-content-new">${newContent}</td>
            <td class="line-content line-content-unified"><span class="prefix">${prefix}</span>${escapeHtml(line.content)}</td>
          `;

          tr.addEventListener("click", (e) => {
            if (e.target.closest("button, textarea, .comment-card")) return;
            onLineClick(e, lineIdx);
          });

          tr.querySelectorAll(".line-add-comment").forEach(btn => {
            btn.addEventListener("click", (e) => {
              e.preventDefault();
              e.stopPropagation();
              startCommentOnLine(lineIdx, btn.dataset.side);
            });
          });

          const nums = tr.querySelectorAll(".line-num");
          nums.forEach(td => {
            td.addEventListener("click", (e) => {
              e.preventDefault();
              e.stopPropagation();
              onLineClick(e, lineIdx);
            });
            td.addEventListener("keydown", (e) => {
              if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                startCommentOnLine(lineIdx, td.dataset.side);
              }
            });
            td.addEventListener("mousedown", (e) => {
              if (e.shiftKey) return;
              if (e.button !== 0) return;
              if (e.target.closest(".line-add-comment")) return;
              e.preventDefault();
              isDragging = true;
              dragStartIdx = lineIdx;
              updateSelectionHighlight(lineIdx, lineIdx);
              updateSelectionFromHighlight();
            });
          });

          tbody.appendChild(tr);
          lineMap.push({ oldNum: line.oldNumber ?? "", newNum: line.newNumber ?? "", type: line.type });
          idx++;

          // After appending the line, check if we need to insert inline comments
          if (insertionPoints.has(idx - 1)) {
            const threadComments = insertionPoints.get(idx - 1);
            tbody.appendChild(createInlineCommentThread(threadComments, fileName));
          }
        }
      }

      // Now add gutter indicators to commented lines
      // Re-compute with the full lineMap
      const allCommentedLines = new Set();
      for (const c of lineComments) {
        const startLine = c.startLine ?? c.line;
        const endLine = c.endLine ?? c.line;
        const side = c.side;
        for (let i = 0; i < lineMap.length; i++) {
          const entry = lineMap[i];
          const numField = side === "old" ? "oldNum" : "newNum";
          const num = entry[numField];
          if (num != null && num !== "") {
            const n = parseInt(num);
            if (n >= startLine && n <= endLine) {
              allCommentedLines.add(i);
            }
          }
        }
      }

      document.querySelectorAll("#diffBody .diff-line").forEach(tr => {
        const i = parseInt(tr.dataset.idx);
        if (allCommentedLines.has(i)) {
          tr.classList.add("has-comment");
        }
      });
    }

    function createInlineCommentThread(threadComments, fileName) {
      const tr = document.createElement("tr");
      tr.className = "comment-thread";

      let cardsHtml = "";
      for (const c of threadComments) {
        let locationText = "File";
        if (c.type === "range") {
          locationText = `${c.side === "old" ? "L" : "R"}${c.startLine}\u2013${c.endLine}`;
        } else if (c.type === "line") {
          locationText = `${c.side === "old" ? "L" : "R"}${c.line}`;
        }

        cardsHtml += `
          <div class="comment-card" data-comment-id="${c.id}">
            <div class="comment-header">
              <span class="comment-avatar">DR</span>
              <span class="comment-author">reviewer</span>
              <span>commented ${escapeHtml(formatTimeAgo(c.createdAt))}</span>
              <span class="comment-location">${escapeHtml(locationText)}</span>
            </div>
            ${c.codeSnippet ? `<div class="comment-code">${escapeHtml(c.codeSnippet)}</div>` : ""}
            <div class="comment-text">${escapeHtml(c.text)}</div>
            <div class="comment-actions">
              <button data-id="${c.id}" class="btn-delete">Delete</button>
            </div>
          </div>
        `;
      }

      tr.innerHTML = `
        <td colspan="5">
          <div class="inline-comment">
            <div class="comment-connector"></div>
            <div class="thread-wrap">
              ${cardsHtml}
            </div>
          </div>
        </td>
      `;

      // Attach delete handlers
      tr.querySelectorAll(".btn-delete").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          try {
            const res = await fetch(`/api/comments?id=${id}`, { method: "DELETE" });
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            comments = comments.filter(x => x.id !== id);
            renderFileList();
            renderDiff();
            updateCommentCount();
            showToast("Comment deleted");
          } catch (e) {
            console.error("Failed to delete comment:", e);
            showToast("Failed to delete comment: " + e.message);
          }
        });
      });

      return tr;
    }

    let isDragging = false;
    let dragStartIdx = null;

    function onLineClick(e, idx) {
      if (e.shiftKey && lastClickedIdx !== null) {
        updateSelectionHighlight(lastClickedIdx, idx);
        updateSelectionFromHighlight();
      } else {
        lastClickedIdx = idx;
        updateSelectionHighlight(idx, idx);
        updateSelectionFromHighlight();
      }
    }

    function startCommentOnLine(idx, preferredSide) {
      clearSelection();
      const row = document.querySelector(`#diffBody tr.diff-line[data-idx="${idx}"]`);
      if (!row) return;

      lastClickedIdx = idx;
      row.classList.add("selecting");

      const rowSide = row.dataset.type === "delete" ? "old" : row.dataset.type === "insert" ? "new" : null;
      const side = preferredSide || rowSide;
      if (side !== "old" && side !== "new") {
        updateSelectionFromHighlight();
        return;
      }

      const numField = side === "old" ? "oldNum" : "newNum";
      const lineNumber = parseInt(row.dataset[numField], 10);
      if (!Number.isInteger(lineNumber)) {
        updateSelectionFromHighlight();
        return;
      }

      const file = files[currentFileIndex];
      if (!file) return;
      const name = file.newName !== "/dev/null" ? file.newName : file.oldName;

      selection = {
        file: name,
        side,
        type: "line",
        line: lineNumber,
        startLine: undefined,
        endLine: undefined,
        codeSnippet: (side === "new" ? "+" : "-") + (row.dataset.content ?? ""),
        insertAfterIdx: idx,
      };

      showInlineForm();
    }

    document.getElementById("diffBody").addEventListener("mouseover", (e) => {
      if (!isDragging) return;
      const tr = e.target.closest("tr.diff-line");
      if (!tr) return;
      const idx = parseInt(tr.dataset.idx);
      updateSelectionHighlight(dragStartIdx, idx);
      updateSelectionFromHighlight();
    });

    document.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
    });

    function updateSelectionHighlight(startIdx, endIdx) {
      document.querySelectorAll(".diff-line.selecting").forEach(el => el.classList.remove("selecting"));
      const minIdx = Math.min(startIdx, endIdx);
      const maxIdx = Math.max(startIdx, endIdx);
      document.querySelectorAll(".diff-line").forEach(tr => {
        const idx = parseInt(tr.dataset.idx);
        if (idx >= minIdx && idx <= maxIdx) {
          tr.classList.add("selecting");
        }
      });
    }

    function updateSelectionFromHighlight() {
      const file = files[currentFileIndex];
      if (!file) return;

      const selectedRows = Array.from(document.querySelectorAll(".diff-line.selecting"));
      if (selectedRows.length === 0) return;

      const changedRows = selectedRows.filter(tr => tr.dataset.type !== "context");
      if (changedRows.length === 0) {
        return;
      }

      const side = changedRows[0].dataset.type === "delete" ? "old" : "new";
      const sameSideRows = changedRows.filter(tr => {
        const s = tr.dataset.type === "delete" ? "old" : "new";
        return s === side;
      });

      if (sameSideRows.length === 0) return;

      const numField = side === "old" ? "oldNum" : "newNum";
      const firstNum = parseInt(sameSideRows[0].dataset[numField], 10);
      const lastNum = parseInt(sameSideRows[sameSideRows.length - 1].dataset[numField], 10);

      if (!Number.isInteger(firstNum) || !Number.isInteger(lastNum)) {
        return;
      }

      const codeSnippet = sameSideRows
        .map(tr => (tr.dataset.type === "insert" ? "+" : "-") + (tr.dataset.content ?? ""))
        .join("\n");

      const name = file.newName !== "/dev/null" ? file.newName : file.oldName;

      selection = {
        file: name,
        side,
        type: sameSideRows.length === 1 ? "line" : "range",
        line: sameSideRows.length === 1 ? firstNum : undefined,
        startLine: sameSideRows.length > 1 ? firstNum : undefined,
        endLine: sameSideRows.length > 1 ? lastNum : undefined,
        codeSnippet,
        insertAfterIdx: parseInt(sameSideRows[sameSideRows.length - 1].dataset.idx, 10),
      };

      showInlineForm();
    }

    function clearSelection() {
      selection = null;
      isDragging = false;
      dragStartIdx = null;
      document.querySelectorAll(".diff-line.selecting").forEach(el => el.classList.remove("selecting"));
      removeInlineForm();
    }

    function removeInlineForm() {
      const existing = document.querySelector("#diffBody .inline-form");
      if (existing) existing.remove();
    }

    function showInlineForm() {
      removeInlineForm();

      if (!selection || selection.type === "file") {
        // For file comments, insert at top of diff
        showFileCommentForm();
        return;
      }

      const tbody = document.getElementById("diffBody");
      const afterIdx = selection.insertAfterIdx;

      // Find the tr element with this idx, then insert after it (or after any comment threads following it)
      const allRows = Array.from(tbody.querySelectorAll("tr"));
      let insertAfterRow = null;
      for (let i = 0; i < allRows.length; i++) {
        const row = allRows[i];
        if (row.classList.contains("diff-line") && parseInt(row.dataset.idx) === afterIdx) {
          // Look ahead for comment threads that belong to this line
          insertAfterRow = row;
          for (let j = i + 1; j < allRows.length; j++) {
            if (allRows[j].classList.contains("comment-thread")) {
              insertAfterRow = allRows[j];
            } else if (allRows[j].classList.contains("inline-form")) {
              insertAfterRow = allRows[j];
            } else {
              break;
            }
          }
          break;
        }
      }

      const formRow = document.createElement("tr");
      formRow.className = "inline-form";

      let infoText;
      if (selection.type === "range") {
        infoText = `${selection.file}:${selection.startLine}\u2013${selection.endLine} (${selection.side})`;
      } else {
        infoText = `${selection.file}:${selection.line} (${selection.side})`;
      }

      formRow.innerHTML = `
        <td colspan="5">
          <div class="inline-comment-form">
            <div class="form-connector"></div>
            <div class="form-wrap">
              <div class="form-card">
                <div class="selection-info">${escapeHtml(infoText)}</div>
                <textarea id="inlineCommentText" placeholder="Leave a comment"></textarea>
                <div class="form-actions">
                  <button class="btn btn-secondary" id="inlineBtnCancel">Cancel</button>
                  <button class="btn btn-secondary" id="inlineBtnReview" disabled>Start review</button>
                  <button class="btn btn-primary" id="inlineBtnSubmit" disabled>Add single comment</button>
                </div>
              </div>
            </div>
          </div>
        </td>
      `;

      if (insertAfterRow && insertAfterRow.nextSibling) {
        tbody.insertBefore(formRow, insertAfterRow.nextSibling);
      } else if (insertAfterRow) {
        tbody.appendChild(formRow);
      } else {
        // Fallback: append at end
        tbody.appendChild(formRow);
      }

      // Scroll form into view
      formRow.scrollIntoView({ behavior: "smooth", block: "nearest" });

      const textarea = formRow.querySelector("#inlineCommentText");
      const submitBtn = formRow.querySelector("#inlineBtnSubmit");
      const reviewBtn = formRow.querySelector("#inlineBtnReview");
      const cancelBtn = formRow.querySelector("#inlineBtnCancel");

      textarea.focus();

      textarea.addEventListener("input", () => {
        const hasText = !!textarea.value.trim();
        submitBtn.disabled = !hasText;
        reviewBtn.disabled = !hasText;
      });

      textarea.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          submitInlineComment("single");
        }
      });

      cancelBtn.addEventListener("click", clearSelection);
      submitBtn.addEventListener("click", () => submitInlineComment("single"));
      reviewBtn.addEventListener("click", () => submitInlineComment("review"));
    }

    function showFileCommentForm() {
      removeInlineForm();

      const tbody = document.getElementById("diffBody");
      const formRow = document.createElement("tr");
      formRow.className = "inline-form";

      formRow.innerHTML = `
        <td colspan="5">
          <div class="inline-comment-form">
            <div class="form-connector"></div>
            <div class="form-wrap">
              <div class="form-card">
                <div class="selection-info">File comment: ${escapeHtml(selection.file)}</div>
                <textarea id="inlineCommentText" placeholder="Leave a comment"></textarea>
                <div class="form-actions">
                  <button class="btn btn-secondary" id="inlineBtnCancel">Cancel</button>
                  <button class="btn btn-secondary" id="inlineBtnReview" disabled>Start review</button>
                  <button class="btn btn-primary" id="inlineBtnSubmit" disabled>Add single comment</button>
                </div>
              </div>
            </div>
          </div>
        </td>
      `;

      // Insert at the top, after any existing file-level comment threads
      const firstNonCommentRow = tbody.querySelector("tr:not(.comment-thread):not(.inline-form):not(.hunk-header)");
      if (firstNonCommentRow) {
        tbody.insertBefore(formRow, firstNonCommentRow);
      } else {
        tbody.insertBefore(formRow, tbody.firstChild);
      }

      formRow.scrollIntoView({ behavior: "smooth", block: "nearest" });

      const textarea = formRow.querySelector("#inlineCommentText");
      const submitBtn = formRow.querySelector("#inlineBtnSubmit");
      const reviewBtn = formRow.querySelector("#inlineBtnReview");
      const cancelBtn = formRow.querySelector("#inlineBtnCancel");

      textarea.focus();

      textarea.addEventListener("input", () => {
        const hasText = !!textarea.value.trim();
        submitBtn.disabled = !hasText;
        reviewBtn.disabled = !hasText;
      });

      textarea.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          submitInlineComment("single");
        }
      });

      cancelBtn.addEventListener("click", clearSelection);
      submitBtn.addEventListener("click", () => submitInlineComment("single"));
      reviewBtn.addEventListener("click", () => submitInlineComment("review"));
    }

    async function submitInlineComment(mode = "single") {
      const textarea = document.querySelector("#inlineCommentText") || document.querySelector("#diffBody textarea");
      if (!textarea || !textarea.value.trim() || !selection) return;

      const text = textarea.value.trim();
      const comment = {
        file: selection.file,
        side: selection.side,
        type: selection.type,
        line: selection.line,
        startLine: selection.startLine,
        endLine: selection.endLine,
        codeSnippet: selection.codeSnippet,
        text,
        createdAt: new Date().toISOString(),
      };

      try {
        const res = await fetch("/api/comments", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(comment),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await safeJson(res);
        comments.push(data.comment);

        clearSelection();
        renderFileList();
        renderDiff();
        updateCommentCount();
        showToast(mode === "review" ? "Comment added to review" : "Comment added");
      } catch (e) {
        console.error("Failed to submit comment:", e);
        showToast("Failed to submit comment: " + e.message);
      }
    }

    document.getElementById("btnFileComment").addEventListener("click", () => {
      if (currentFileIndex < 0) return;
      const file = files[currentFileIndex];
      const name = file.newName !== "/dev/null" ? file.newName : file.oldName;
      selection = {
        file: name,
        type: "file",
        side: null,
        line: undefined,
        startLine: undefined,
        endLine: undefined,
        codeSnippet: "",
      };
      showFileCommentForm();
    });

    document.getElementById("btnSplitView").addEventListener("click", () => {
      setViewMode("split");
    });

    document.getElementById("btnUnifiedView").addEventListener("click", () => {
      setViewMode("unified");
    });

    async function loadComments() {
      try {
        const res = await fetch("/api/comments");
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await safeJson(res);
        comments = data.comments;
        renderFileList();
        updateCommentCount();
      } catch (e) {
        console.error("Failed to load comments:", e);
        showToast("Failed to load comments: " + e.message);
      }
    }

    function updateCommentCount() {
      const count = comments.length;
      document.getElementById("commentCount").textContent = count;
      document.getElementById("pendingCount").textContent = count;
      document.getElementById("pendingLabel").textContent = count === 1 ? "pending comment" : "pending comments";
      document.getElementById("btnExport").disabled = count === 0;
      document.getElementById("btnSubmitReview").disabled = count === 0;
    }

    document.getElementById("btnExport").addEventListener("click", async () => {
      try {
        const res = await fetch("/api/export", { method: "POST" });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await safeJson(res);
        document.getElementById("exportContent").textContent = data.markdown;
        document.getElementById("exportModal").classList.add("show");
      } catch (e) {
        console.error("Failed to export:", e);
        showToast("Failed to export: " + e.message);
      }
    });

    document.getElementById("btnSubmitReview").addEventListener("click", () => {
      document.getElementById("btnExport").click();
    });

    document.getElementById("btnReviewCancel").addEventListener("click", () => {
      clearSelection();
      showToast("Draft form dismissed.");
    });

    document.getElementById("btnCopyExport").addEventListener("click", async () => {
      const text = document.getElementById("exportContent").textContent;
      await navigator.clipboard.writeText(text);
      showToast("Copied to clipboard");
    });

    document.getElementById("modalClose").addEventListener("click", () => {
      document.getElementById("exportModal").classList.remove("show");
    });

    document.getElementById("btnCloseModal").addEventListener("click", () => {
      document.getElementById("exportModal").classList.remove("show");
    });

    document.getElementById("exportModal").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById("exportModal").classList.remove("show");
      }
    });

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function formatTimeAgo(value) {
      if (!value) return "just now";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "just now";
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/\//g, "&#x2F;");
    }

    async function safeJson(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error("Invalid JSON response from server");
      }
    }

    document.addEventListener("keydown", (e) => {
      // Ignore if user is typing in a text field
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;

      if (e.key === "Escape") {
        if (document.getElementById("exportModal").classList.contains("show")) {
          document.getElementById("exportModal").classList.remove("show");
        } else {
          clearSelection();
        }
        return;
      }

      if (e.key.toLowerCase() === "v") {
        e.preventDefault();
        setViewMode(viewMode === "split" ? "unified" : "split");
        return;
      }

      // File list keyboard navigation
      if ((e.key === "j" || e.key === "ArrowDown") && files.length > 0) {
        e.preventDefault();
        const nextIdx = Math.min(currentFileIndex + 1, files.length - 1);
        if (nextIdx !== currentFileIndex) selectFile(nextIdx);
        return;
      }

      if ((e.key === "k" || e.key === "ArrowUp") && files.length > 0) {
        e.preventDefault();
        const prevIdx = Math.max(currentFileIndex - 1, 0);
        if (prevIdx !== currentFileIndex) selectFile(prevIdx);
        return;
      }
    });

    init();
    })();
  </script>
</body>
</html>
